<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/style.css">
    <title>Calculadora de Matriz</title>
</head>
<body>
    <header>
        <p id="title">MATRIZ</p><hr>
        <p id="subtitle">calculadora de matrizes · passo a passo</p>
    </header>
    <main>
        <section id="sectionEscolhaMatrizA">
            <div class="titleForm">
                <p>MATRIZ A</p><hr>
            </div>
            <form action="" id="formMatrizA">
                <div class="divSelects">
                    <select name="selLinhaMatrizA" id="selLinhaMatrizA">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3" selected>3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                    </select>
                    <p>x</p>
                    <select name="selColunaMatrizA" id="selColunaMatrizA">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3" selected>3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                    </select>
                </div>
                <div id="divMatrizA">
                </div>
            </form>
        </section>

        <button id="btnMatrizB">+ ADICIONAR MATRIZ B</button>    
        <section id="sectionEscolhaMatrizB">
        </section>

        <section id="sectionOperacoes">
            <div class="titleOperacao">
                Operação
            </div>
        </section>
    </main>
    <script src="script/script.js"></script>
</body>
</html>
